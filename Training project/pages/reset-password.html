<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMEMS – Reset Password</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="login-page">
  <div class="login-brand">
    <div class="login-logo" style="width:56px;height:56px;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <h1>SMEMS</h1>
    <p>Smart Medical Equipment Management System</p>
  </div>

  <div class="login-card">
    <h2 style="font-size:20px;margin-bottom:8px;">Reset Password</h2>
    <p style="font-size:13px;color:var(--text-3);margin-bottom:24px;">
      Enter your professional email address and we'll send you a link to reset your password.
    </p>

    <div class="form-group">
      <label class="form-label">Work Email Address</label>
      <input type="email" class="form-control" name="email" id="reset-email" placeholder="name@hospital.com">
    </div>

    <button type="button" class="btn btn-primary btn-full" style="margin-bottom:16px;"
      onclick="sendReset()">
      Send Reset Link
    </button>

    <div style="text-align:center;font-size:13px;color:var(--text-3);margin-bottom:12px;">
      Forgot your email?
      <span style="color:var(--danger);font-weight:500;cursor:pointer;">Contact IT Support</span>
    </div>

    <div style="text-align:center;">
      <a href="../index.html" style="font-size:13px;color:var(--primary);text-decoration:none;">← Back to Login</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
function sendReset() {
  var email = document.getElementById('reset-email').value.trim();
  if (!email) { showToast('Please enter your email address', 'error'); return; } showToast('Reset link sent to ' + email, 'success');
}
document.getElementById('reset-email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendReset();
});
</script>
</body>
</html>
