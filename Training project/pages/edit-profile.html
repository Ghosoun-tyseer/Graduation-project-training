<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMEMS – Edit Profile</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="logo-text"><strong>SMEMS</strong><small>Medical Equipment</small></div>
    </div>
 <nav class="sidebar-nav" id="sidebar-nav"></nav>
 
    <div class="sidebar-footer">

      <a href="../index.html" class="logout-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</a>
    </div>
  </aside>

  <main class="main">
  <div class="top-bar">
    <span class="top-date" id="live-clock">Sunday, April 20, 2026</span>
    <div class="top-right">
      <a href="notifications.html" class="notif-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge">2</span>
      </a>
      <a href="profile.html" class="user-chip">
        <div style="text-align:right;">
          <div class="uname">Nurse Sarah Ahmed</div>
          <div class="urole">Medical Staff / ICU</div>
        </div>
        <div class="avatar">SA</div>
      </a>
    </div>
  </div>

    <div class="page">

      <div class="page-header"><div class="page-title">Edit Profile</div></div>
     
      <div class="profile-hero">
        <div class="profile-av" id="ep-av">SA</div>
        <div style="flex:1;">
          <div class="profile-name" id="ep-name">Dr. Sarah Ahmed</div>
          <span class="badge b-staff" style="margin-top:6px;display:inline-flex;">Medical Staff</span>
          <div class="profile-meta"><span>ICU Department</span><span style="opacity:.3;">|</span><span>ID: EMP-1023</span></div>
        </div>
        <button class="btn btn-primary"
          onclick="showToast('Profile saved! Connect backend to persist.','success')">Save</button>
      </div>
      <div class="info-section">
        <div class="info-section-ttl">Personal Information</div>
        <div class="info-2col">
          <div class="form-group"><label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" value="Dr. Sarah Ahmed"
              oninput="document.getElementById('ep-name').textContent=this.value||'Dr. Sarah Ahmed'"></div>
          <div class="form-group"><label class="form-label">Username</label><input class="form-control" name="username" value="sarah123"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="sarah@email.com"></div>
          <div class="form-group"><label class="form-label">Phone</label><input class="form-control" name="phone" value="0790000000"></div>
        </div>
      </div>
      <div class="info-section">
        <div class="info-section-ttl">Work Information</div>
        <div class="info-2col">
          <div class="form-group"><label class="form-label">Role</label><input class="form-control" value="Medical Staff" readonly></div>
          <div class="form-group"><label class="form-label">Department</label><input class="form-control" value="ICU" readonly></div>
          <div class="form-group"><label class="form-label">Position</label><input class="form-control" name="position" value="Doctor"></div>
          <div class="form-group"><label class="form-label">Joined Date</label><input class="form-control" type="date" name="join_date" value="2022-01-10"></div>
        </div>
      </div>
      <div class="info-section">
        <div class="info-section-ttl">Security</div>
        <a href="reset-password.html" class="btn btn-primary">🔒 Change Password</a>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:4px;">
        <a href="profile.html" class="btn btn-outline">Cancel</a>
        <button class="btn btn-primary"
          onclick="showToast('Profile saved! Connect backend to persist.','success')">Save Changes</button>
      </div>

    </div>

  </main>
</div>
<script src="../js/main.js"></script>
</body>
</html>
